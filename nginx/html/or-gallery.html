<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111;
  --bg2: #1a1a1a;
  --bg3: #242424;
  --border: #333;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #7eb8f7;
  --danger: #e05252;
  --radius: 8px;
  --toolbar-h: 52px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; overflow: hidden; }

/* ─── Scrollable container ─── */
#app { height: 100%; display: flex; flex-direction: column; }

/* ─── Toolbar ─── */
#toolbar {
  height: var(--toolbar-h);
  min-height: var(--toolbar-h);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  flex-shrink: 0;
  user-select: none;
  opacity: 0.2;
  transition: opacity .2s;
}
#toolbar:hover { opacity: 1; }
#toolbar .btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 32px; min-width: 32px; padding: 0 8px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); cursor: pointer;
  font-size: 14px; white-space: nowrap; transition: background .15s;
}
#toolbar .btn:hover { background: #333; }
#toolbar .btn.active { background: var(--accent); color: #111; border-color: var(--accent); }
#toolbar .btn.danger { border-color: var(--danger); color: var(--danger); }
#toolbar .btn.danger:hover { background: var(--danger); color: #fff; }
#toolbar .spacer { flex: 1; }
#toolbar .breadcrumb {
  flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  color: var(--text2); font-size: 13px; direction: rtl; text-align: left;
}
#toolbar .breadcrumb span { direction: ltr; unicode-bidi: bidi-override; }
#toolbar .page-info { color: var(--text2); font-size: 13px; white-space: nowrap; }

/* ─── Gallery View ─── */
#gallery-view {
  flex: 1; overflow-y: auto; padding: 12px;
}
#gallery-view.hidden { display: none; }
#status-msg.hidden { display: none; }
#gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
@media (max-width: 480px) {
  #gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  #gallery-view { padding: 8px; }
}
@media (min-width: 768px) {
  #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}
@media (min-width: 1200px) {
  #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

.card {
  position: relative; cursor: pointer; border-radius: var(--radius);
  overflow: hidden; background: var(--bg3); border: 1px solid var(--border);
  transition: transform .15s, box-shadow .15s;
  touch-action: manipulation;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.5); }
.card:active { transform: scale(.97); }
.card .thumb-wrap {
  position: relative; width: 100%; padding-bottom: 140%; /* 5:7 ratio */
  background: var(--bg2); overflow: hidden;
}
.card .thumb-wrap img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transition: opacity .3s;
}
.card .thumb-wrap img.loading { opacity: 0; }
.card .thumb-wrap .placeholder {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 36px; color: var(--text2);
}
.card .card-info {
  padding: 6px 8px 8px;
}
.card .card-name {
  font-size: 12px; line-height: 1.4;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  word-break: break-all;
}
.card .card-meta {
  margin-top: 3px; font-size: 11px; color: var(--text2);
}
.card .del-btn {
  position: absolute; top: 6px; right: 6px;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; opacity: 0; transition: opacity .15s;
  z-index: 2;
}
.card:hover .del-btn { opacity: 1; }
#gallery-grid.del-mode .del-btn { opacity: 1; }

/* ─── Keyboard focus ring ─── */
.card.kb-focus {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.5), 0 0 0 3px var(--accent);
  z-index: 1;
}
.card.kb-focus .del-btn { opacity: 1; }

/* sentinel for infinite scroll */
#gallery-sentinel { height: 1px; width: 100%; }

/* ─── Pagination ─── */
#gallery-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 12px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
}
#gallery-pagination.hidden { display: none; }
#gallery-pagination .btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 36px; height: 36px; padding: 0 12px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); cursor: pointer;
  font-size: 14px; transition: background .15s;
}
#gallery-pagination .btn:hover:not(:disabled) { background: #333; }
#gallery-pagination .btn:disabled { opacity: .4; cursor: not-allowed; }
#gallery-pagination .btn.active { background: var(--accent); color: #111; border-color: var(--accent); }
#gallery-pagination .page-info { color: var(--text2); font-size: 13px; min-width: 80px; text-align: center; }
#gallery-pagination .page-jump { display: flex; align-items: center; gap: 6px; }
#gallery-pagination .page-jump input {
  width: 50px; height: 32px; padding: 0 8px;
  border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-size: 14px; text-align: center;
}
#gallery-pagination .page-jump input:focus { outline: none; border-color: var(--accent); }

/* ─── Reader View ─── */
#reader-view {
  flex: 1; position: relative; overflow: hidden;
  display: none; background: #000;
  touch-action: none;
}
#reader-view.active { display: flex; flex-direction: column; }

#reader-toolbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--toolbar-h);
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  background: linear-gradient(to bottom, rgba(0,0,0,.85), transparent);
  transition: opacity .25s; pointer-events: auto;
}
#reader-toolbar.hidden { opacity: 0; pointer-events: none; }
#reader-toolbar .btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 30px; min-width: 30px; padding: 0 8px;
  border-radius: 6px; border: 1px solid rgba(255,255,255,.2);
  background: rgba(0,0,0,.5); color: var(--text); cursor: pointer;
  font-size: 13px; white-space: nowrap;
}
#reader-toolbar .btn:hover { background: rgba(255,255,255,.15); }
#reader-toolbar .btn.active { background: var(--accent); color: #111; border-color: var(--accent); }
#reader-toolbar .btn.disabled { opacity: .3; cursor: not-allowed; }

/* Page canvas */
#page-canvas {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
  gap: 0; background: #000;
}
#page-canvas.orig {
  overflow: auto;
  align-items: flex-start;
  justify-content: flex-start;
  flex-wrap: wrap;
}

.page-img-wrap {
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
/* Fit mode: fill available space */
.page-img-wrap.fit {
  width: 100%; height: 100%;
}
.page-img-wrap.fit img {
  width: 100%; height: 100%;
  max-width: none; max-height: none;
  object-fit: contain;
  user-select: none; -webkit-user-drag: none;
  display: block;
}
/* Orig mode: natural size, scroll-to-zoom handled via JS transform */
.page-img-wrap.orig {
  width: auto; height: auto; min-width: min-content;
  transform-origin: top left;   /* JS overrides per-zoom */
}
.page-img-wrap.orig img {
  width: auto; height: auto;
  display: block;
  user-select: none; -webkit-user-drag: none;
}
/* Rotate mode: rotate 90°, swap w/h logic */
.page-img-wrap.rotate {
  width: 100%; height: 100%;
  overflow: visible;
}
.page-img-wrap.rotate img {
  /* Before rotation: width = container height, height = container width.
     After rotate(90deg) the visual footprint becomes container width × height,
     which exactly fills the viewport. object-fit:contain preserves aspect ratio. */
  width: var(--canvas-h, 100vh);
  height: var(--canvas-w, 100vw);
  max-width: none; max-height: none;
  object-fit: contain;
  transform: rotate(90deg);
  transform-origin: center;
}

/* double page */
#page-canvas.double { gap: 0; }
#page-canvas.double .page-img-wrap.fit { width: 50%; height: 100%; }
#page-canvas.double .page-img-wrap.orig { width: auto; height: auto; }
#page-canvas.double .page-img-wrap.rotate { width: 50%; height: 100%; }

/* Loading spinner */
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.1);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; position: absolute;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* OSD */
#osd {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,.75); color: #fff; font-size: 18px;
  padding: 10px 20px; border-radius: 8px; pointer-events: none;
  opacity: 0; transition: opacity .3s; z-index: 999;
}
#osd.show { opacity: 1; }


/* ─── Loading skeleton ─── */
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, #2e2e2e 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius);
}
@keyframes shimmer { to { background-position: -200% 0; } }
.card.skeleton .thumb-wrap { padding-bottom: 140%; }
.card.skeleton .card-name { height: 12px; margin: 8px; border-radius: 4px; }

/* ─── Empty / Error states ─── */
#status-msg {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text2); text-align: center; padding: 32px;
  display: none;
}
#status-msg.show { display: flex; }
#status-msg .status-icon { font-size: 48px; }
#status-msg .status-text { font-size: 16px; }
#status-msg .status-sub { font-size: 13px; }

/* ─── Gallerize Modal ─── */
#gallerize-modal {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.7); align-items: center; justify-content: center;
}
#gallerize-modal.show { display: flex; }
#gallerize-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px 24px 24px;
  width: min(480px, 92vw); max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
#gallerize-box h3 {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin: 0; display: flex; align-items: center; gap: 8px;
}
#gallerize-box .modal-close {
  margin-left: auto; cursor: pointer; font-size: 18px;
  color: var(--text2); background: none; border: none; line-height: 1;
  padding: 2px 6px; border-radius: 4px;
}
#gallerize-box .modal-close:hover { color: var(--text); background: var(--bg3); }

/* Mode selector */
.gz-mode-row {
  display: flex; gap: 8px;
}
.gz-mode-btn {
  flex: 1; padding: 8px 0; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all .15s; text-align: center;
}
.gz-mode-btn.active {
  border-color: var(--accent); background: rgba(126,184,247,.12);
  color: var(--accent);
}
.gz-mode-btn:hover:not(.active) { background: #2d2d2d; color: var(--text); }

/* Remote URL config */
.gz-remote-section {
  display: none; flex-direction: column; gap: 8px;
}
.gz-remote-section.show { display: flex; }
.gz-label { font-size: 12px; color: var(--text2); }
.gz-input {
  width: 100%; height: 34px; padding: 0 10px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px;
}
.gz-input:focus { outline: none; border-color: var(--accent); }
.gz-hint { font-size: 11px; color: var(--text2); }

/* Path info */
.gz-path-row {
  background: var(--bg3); border-radius: 6px; padding: 8px 10px;
  font-size: 12px; color: var(--text2); word-break: break-all;
  border: 1px solid var(--border);
}
.gz-path-row strong { color: var(--text); }

/* Action buttons */
.gz-actions {
  display: flex; gap: 8px; justify-content: flex-end;
}
.gz-btn {
  padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); cursor: pointer;
  font-size: 13px; font-weight: 500; transition: background .15s;
}
.gz-btn:hover { background: #333; }
.gz-btn.primary {
  background: var(--accent); color: #111; border-color: var(--accent);
}
.gz-btn.primary:hover { background: #9acbfa; }
.gz-btn:disabled { opacity: .45; cursor: not-allowed; }

/* Progress / result */
.gz-progress {
  display: none; flex-direction: column; gap: 10px;
}
.gz-progress.show { display: flex; }
.gz-progress-bar-wrap {
  height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden;
}
.gz-progress-bar {
  height: 100%; background: var(--accent);
  border-radius: 3px; transition: width .4s;
}
.gz-progress-text {
  font-size: 12px; color: var(--text2);
}
.gz-result {
  display: none; flex-direction: column; gap: 8px;
}
.gz-result.show { display: flex; }
.gz-result-summary {
  font-size: 13px; color: var(--text);
  padding: 10px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
}
.gz-result-summary.ok { border-color: #4caf50; }
.gz-result-summary.err { border-color: var(--danger); }
.gz-stat-row {
  display: flex; gap: 16px; font-size: 12px; color: var(--text2); flex-wrap: wrap;
}
.gz-stat-row span strong { color: var(--text); }
.gz-errors {
  max-height: 120px; overflow-y: auto;
  font-size: 11px; color: var(--danger);
  background: rgba(224,82,82,.08); border-radius: 4px;
  padding: 6px 8px; border: 1px solid rgba(224,82,82,.2);
}
.gz-errors div { margin-bottom: 2px; word-break: break-all; }
</style>
</head>
<body>
<div id="app">
  <!-- ─── Gallery Toolbar ─── -->
  <div id="toolbar">
    <button class="btn" id="btn-back" title="返回上级 (B)">←</button>
    <div class="breadcrumb"><span id="breadcrumb-text">/</span></div>
    <button class="btn" id="btn-del-mode" title="删除模式">🗑</button>
  </div>

  <!-- ─── Gallery Grid ─── -->
  <div id="gallery-view">
    <div id="gallery-grid"></div>
    <div id="gallery-sentinel"></div>
    <!-- Pagination -->
    <div id="gallery-pagination" class="hidden">
      <button class="btn" id="pg-first" title="首页">««</button>
      <button class="btn" id="pg-prev" title="上一页">←</button>
      <div class="page-info" id="pg-info">1 / 1</div>
      <button class="btn" id="pg-next" title="下一页">→</button>
      <button class="btn" id="pg-last" title="末页">»»</button>
      <div class="page-jump">
        <input type="number" id="pg-input" min="1" value="1">
        <button class="btn" id="pg-go">Go</button>
      </div>
    </div>
  </div>

  <!-- ─── Status (empty/error) ─── -->
  <div id="status-msg">
    <div class="status-icon" id="status-icon">📂</div>
    <div class="status-text" id="status-text">空文件夹</div>
    <div class="status-sub" id="status-sub"></div>
  </div>

  <!-- ─── Reader View ─── -->
  <div id="reader-view">
    <div id="reader-toolbar">
      <button class="btn" id="rbtn-back" title="返回 (B/Esc)">←</button>
      <span class="page-info" id="page-info" style="color:#ccc;font-size:13px;flex:1;text-align:center"></span>
      <button class="btn" id="rbtn-double" title="单/双页">单页</button>
      <button class="btn" id="rbtn-rtl" title="翻页方向">LTR→</button>
      <button class="btn" id="rbtn-view" title="视图模式 (O)">Fit</button>
      <button class="btn" id="rbtn-rotate" title="旋转 (V)">🔄</button>
      <button class="btn" id="rbtn-fs" title="全屏 (F)">⛶</button>
      <button class="btn" id="rbtn-gallerize" title="整理为 Gallery (v1)">✨ Gallerize</button>
      <button class="btn danger" id="rbtn-del" title="删除当前图 (Del)">🗑</button>
    </div>
    <div id="page-canvas">
      <div class="spinner" id="reader-spinner"></div>
    </div>
  </div>
</div>


<!-- ─── OSD ─── -->
<div id="osd"></div>

<!-- ─── Gallerize Modal ─── -->
<div id="gallerize-modal">
  <div id="gallerize-box">
    <h3>✨ Gallerize
      <button class="modal-close" id="gz-close">✕</button>
    </h3>

    <!-- Current path -->
    <div class="gz-path-row">
      整理目录：<strong id="gz-path-display">/</strong>
    </div>

    <!-- Mode selector -->
    <div>
      <div class="gz-label" style="margin-bottom:6px">执行模式</div>
      <div class="gz-mode-row">
        <button class="gz-mode-btn active" data-mode="local">🖥 Local</button>
        <button class="gz-mode-btn" data-mode="remote">🌐 Remote</button>
      </div>
    </div>

    <!-- Remote config (hidden when local) -->
    <div class="gz-remote-section" id="gz-remote-section">
      <div class="gz-label">远程服务地址</div>
      <input class="gz-input" id="gz-remote-url" type="url"
             placeholder="http://192.168.1.100:8080"
             autocomplete="off" spellcheck="false">
      <div class="gz-hint">填写远端 OpenResty 服务根地址，目录整理在本机执行，图片转换转发到远端 /api/img</div>
    </div>

    <!-- Image conversion params -->
    <div>
      <div class="gz-label">图片转换参数（可选）</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px">
        <div>
          <div class="gz-label" style="margin-top:0">宽度</div>
          <input class="gz-input" id="gz-w" type="number" min="1" placeholder="2560">
        </div>
        <div>
          <div class="gz-label" style="margin-top:0">高度</div>
          <input class="gz-input" id="gz-h" type="number" min="1" placeholder="2560">
        </div>
      </div>
      <div style="margin-top:8px">
        <select class="gz-input" id="gz-fit" style="height:auto;padding:6px">
          <option value="">保持默认 (contain)</option>
          <option value="contain">contain (包含)</option>
          <option value="cover">cover (覆盖)</option>
          <option value="fill">fill (填充)</option>
          <option value="crop">crop (裁剪)</option>
        </select>
      </div>
      <div style="margin-top:8px">
        <div class="gz-label" style="margin-top:0">质量 (1-100)</div>
        <input class="gz-input" id="gz-q" type="number" min="1" max="100" placeholder="90">
      </div>
    </div>

    <!-- Concurrency (only for remote) -->
    <div class="gz-remote-section" id="gz-concurrency-section">
      <div class="gz-label">并发请求数</div>
      <input class="gz-input" id="gz-concurrency" type="number" min="1" max="64" value="12">
      <div class="gz-hint">A 服务器同时向 B 服务器发送的最大并发数（默认 12）</div>
    </div>

    <!-- Progress bar (shown during processing) -->
    <div class="gz-progress" id="gz-progress">
      <div class="gz-progress-text" id="gz-progress-text">正在处理…</div>
      <div class="gz-progress-bar-wrap">
        <div class="gz-progress-bar" id="gz-progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Result (shown after done) -->
    <div class="gz-result" id="gz-result">
      <div class="gz-result-summary" id="gz-result-summary"></div>
      <div class="gz-stat-row" id="gz-stat-row"></div>
      <div class="gz-errors" id="gz-errors" style="display:none"></div>
    </div>

    <!-- Action buttons -->
    <div class="gz-actions">
      <button class="gz-btn" id="gz-cancel">取消</button>
      <button class="gz-btn primary" id="gz-run">开始整理</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
const IMG_EXTS = new Set([
  'jpg','jpeg','jfif','jxl','jp2','jpx',   // JPEG family
  'png','gif','webp','avif','bmp','svg',    // common web
  'tiff','tif',                             // TIFF
  'heif','heic',                            // Apple HEIF
  'ico','cur',                              // icon formats
]);
const ZIP_EXTS = new Set(['zip','cbz','epub']);
const COVER_RE = /^(\d{0,6}[-_\s]?)cover/i;

function extOf(name) {
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i + 1).toLowerCase() : '';
}
function isImage(name) { return IMG_EXTS.has(extOf(name)); }
function isZip(type) { return type === 'zip'; }
function isDir(type) { return type === 'dir'; }

/** Natural sort comparator */
function naturalCmp(a, b) {
  const re = /(\d+)/g;
  const pa = a.split(re), pb = b.split(re);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const sa = pa[i] ?? '', sb = pb[i] ?? '';
    if (i % 2 === 1) { // numeric segment
      const na = parseInt(sa, 10) || 0, nb = parseInt(sb, 10) || 0;
      if (na !== nb) return na - nb;
    } else {
      const c = sa.localeCompare(sb, undefined, {sensitivity: 'base'});
      if (c !== 0) return c;
    }
  }
  return 0;
}

function naturalSort(arr, key) {
  return [...arr].sort((a, b) => naturalCmp(key ? a[key] : a, key ? b[key] : b));
}

/** Pick cover from a list of items (already natural-sorted) */
function pickCover(items) {
  const imgs = items.filter(it => it.type === 'file' && isImage(it.name));
  if (!imgs.length) return null;
  const cover = imgs.find(it => COVER_RE.test(it.name));
  return cover || imgs[0];
}

/** Build a URL for serving a file */
function fileUrl(path, name) {
  // path already has leading slash, name is bare filename
  const base = path.endsWith('/') ? path : path + '/';
  return encodeFilePath(base + name);
}

/** Build a URL for a file inside a zip via ZipFS */
function zipFileUrl(archivePath, internalPath) {
  // archivePath like /foo/bar.cbz, internalPath like cover.jpg or ch1/01.jpg
  // internalPath may contain slashes (sub-dirs), encode each segment separately
  const encodedInternal = internalPath.split('/').map(s => encodeURIComponent(s)).join('/');
  return '/zip' + encodeFilePath(archivePath) + '/' + encodedInternal;
}

function encodeFilePath(p) {
  // Encode each path segment individually, preserving slashes
  return p.split('/').map(s => s ? encodeURIComponent(s) : s).join('/');
}

function joinPath(...parts) {
  return '/' + parts.join('/').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
}

/** Format file size */
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

/* ═══════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════ */
async function apiLs(path, opts = {}) {
  const params = new URLSearchParams({
    sort: 'name', order: 'asc',
    page: String(opts.page ?? 1),
    page_size: String(opts.page_size ?? 50),
  });
  // Encode path segments to handle special chars like # in directory names
  const url = '/api/ls' + encodeFilePath(path.startsWith('/') ? path : '/' + path) + '?' + params;
  const res = await fetch(url);
  if (!res.ok) {
    const json = await res.json().catch(() => ({}));
    throw new Error(json.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function apiRm(path) {
  // Encode path segments to handle special chars like # in directory names
  const res = await fetch('/api/rm' + encodeFilePath(path.startsWith('/') ? path : '/' + path), { method: 'DELETE' });
  if (!res.ok) {
    const json = await res.json().catch(() => ({}));
    throw new Error(json.message || `HTTP ${res.status}`);
  }
  return res.json();
}

/**
 * Fetch all gallery items (dirs and zips) from a path.
 * Used for sibling navigation in Reader.
 * @param {string} path
 */
async function fetchAllGalleryItems(path) {
  console.log('[fetchAllGalleryItems] called with path:', path);
  const PAGE = 100;
  let page = 1, all = [];
  try {
    while (true) {
      const data = await apiLs(path, { page, page_size: PAGE });
      console.log('[fetchAllGalleryItems] page', page, 'items:', data.items.length, 'total:', data.total);
      for (const it of data.items) {
        if (isDir(it.type) || isZip(it.type)) {
          all.push(it);
        }
      }
      if (data.page * data.page_size >= data.total || data.items.length === 0) break;
      page++;
    }
    // Sort by name (natural sort) - use naturalCmp for comparison
    const result = all.sort((a, b) => naturalCmp(a.name, b.name));
    console.log('[fetchAllGalleryItems] returning', result.length, 'items');
    return result;
  } catch (err) {
    console.error('[fetchAllGalleryItems] error:', err);
    throw err;
  }
}

/**
 * Fetch ALL images in a path, handling pagination.
 * @param {string}  path      — directory or zip path
 * @param {boolean} recursive — when true, descend into sub-directories (used for zip reader)
 */
async function fetchAllImages(path, recursive = false) {
  const PAGE = 200;
  let page = 1, all = [], subdirs = [];
  while (true) {
    const data = await apiLs(path, { page, page_size: PAGE });
    for (const it of data.items) {
      if (it.type === 'file' && isImage(it.name)) {
        all.push({ ...it, _path: path }); // keep original path for URL building
      } else if (recursive && (it.type === 'dir')) {
        subdirs.push(joinPath(path, it.name));
      }
    }
    if (data.page * data.page_size >= data.total || data.items.length === 0) break;
    page++;
  }
  // Recurse into subdirs (BFS order → natural sort across levels)
  for (const sub of subdirs) {
    const subImgs = await fetchAllImages(sub, true);
    all = all.concat(subImgs);
  }
  // naturalSort only by name within each dir (cross-dir order by discovery = dir sort)
  return naturalSort(all, 'name');
}

/** Fetch cover: get first page, find cover image; for zips recurse into subdirs */
async function fetchCoverItem(path) {
  try {
    const data = await apiLs(path, { page: 1, page_size: 20 });
    let imgs = naturalSort(data.items, 'name').filter(it => it.type === 'file' && isImage(it.name));
    let coverPath = path; // the directory where the cover lives
    // If no images at root but has subdirs, peek into first subdir (common cbz layout)
    if (!imgs.length) {
      const firstSubdir = naturalSort(data.items, 'name').find(it => it.type === 'dir');
      if (firstSubdir) {
        coverPath = joinPath(path, firstSubdir.name);
        const sub = await apiLs(coverPath, { page: 1, page_size: 5 });
        imgs = naturalSort(sub.items, 'name').filter(it => it.type === 'file' && isImage(it.name));
      }
    }
    if (!imgs.length && data.total > 20) {
      coverPath = path;
      const data2 = await apiLs(path, { page: 2, page_size: 20 });
      imgs = naturalSort(data2.items, 'name').filter(it => it.type === 'file' && isImage(it.name));
    }
    const item = pickCover(imgs);
    return item ? { item, coverPath } : null;
  } catch { return null; }
}

/* ═══════════════════════════════════════════════════
   GALLERIZE CONTROLLER
═══════════════════════════════════════════════════ */
const Gallerize = {
  // ── localStorage keys ──────────────────────────────
  LS_MODE: 'or-gallery-gz-mode',   // 'local' | 'remote'
  LS_REMOTE: 'or-gallery-gz-remote', // remote base URL
  LS_W: 'or-gallery-gz-w',         // image width
  LS_H: 'or-gallery-gz-h',         // image height
  LS_FIT: 'or-gallery-gz-fit',     // fit mode
  LS_Q: 'or-gallery-gz-q',         // quality
  LS_CONCURRENCY: 'or-gallery-gz-concurrency', // concurrency count

  _mode: 'local',      // current selected mode
  _remoteUrl: '',      // remote base URL
  _imgParams: { w: null, h: null, fit: null, q: null }, // image conversion params
  _concurrency: 12,    // remote concurrency (default 12)
  _running: false,

  init() {
    // Restore persisted settings
    this._mode      = localStorage.getItem(this.LS_MODE) || 'local';
    this._remoteUrl = localStorage.getItem(this.LS_REMOTE) || '';
    this._imgParams = {
      w: localStorage.getItem(this.LS_W),
      h: localStorage.getItem(this.LS_H),
      fit: localStorage.getItem(this.LS_FIT),
      q: localStorage.getItem(this.LS_Q),
    };
    this._concurrency = parseInt(localStorage.getItem(this.LS_CONCURRENCY) || '12', 10);

    // Wire reader toolbar button (button is now in reader-view toolbar)
    document.getElementById('rbtn-gallerize').addEventListener('click', () => this.open());

    // Wire modal close buttons
    document.getElementById('gz-close').addEventListener('click', () => this.close());
    document.getElementById('gz-cancel').addEventListener('click', () => this.close());
    document.getElementById('gallerize-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('gallerize-modal')) this.close();
    });

    // Mode selector
    document.querySelectorAll('.gz-mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this._mode = btn.dataset.mode;
        localStorage.setItem(this.LS_MODE, this._mode);
        this._syncModeUI();
      });
    });

    // Remote URL input — persist on change
    document.getElementById('gz-remote-url').addEventListener('input', e => {
      this._remoteUrl = e.target.value.trim();
      localStorage.setItem(this.LS_REMOTE, this._remoteUrl);
    });

    // Image params inputs — persist on change
    ['w','h','fit','q'].forEach(key => {
      const el = document.getElementById('gz-' + key);
      el.addEventListener('input', e => {
        const val = e.target.value.trim();
        this._imgParams[key] = val ? val : null;
        localStorage.setItem(this['LS_' + key.toUpperCase()], val || '');
      });
    });

    // Concurrency input — persist on change
    document.getElementById('gz-concurrency').addEventListener('input', e => {
      this._concurrency = parseInt(e.target.value, 10) || 12;
      localStorage.setItem(this.LS_CONCURRENCY, String(this._concurrency));
    });

    // Run button
    document.getElementById('gz-run').addEventListener('click', () => this.run());
  },

  // Resolve the directory to gallerize: always the directory Reader is currently browsing.
  // Reader._path is the opened dir/zip path; if it's a zip, use its parent dir.
  _readerDir() {
    const p = Reader._path || GalleryView._path || '/';
    if (Reader._isZip) {
      // Strip the zip filename to get its parent directory
      return p.replace(/\/[^/]+$/, '') || '/';
    }
    return p;
  },

  open() {
    const path = this._readerDir();
    document.getElementById('gz-path-display').textContent = path;

    // Restore UI state
    this._syncModeUI();
    document.getElementById('gz-remote-url').value = this._remoteUrl;

    // Restore image params
    document.getElementById('gz-w').value = this._imgParams.w || '';
    document.getElementById('gz-h').value = this._imgParams.h || '';
    document.getElementById('gz-fit').value = this._imgParams.fit || '';
    document.getElementById('gz-q').value = this._imgParams.q || '';
    document.getElementById('gz-concurrency').value = String(this._concurrency);

    // Reset progress & result
    this._setRunning(false);
    document.getElementById('gz-progress').classList.remove('show');
    document.getElementById('gz-result').classList.remove('show');
    document.getElementById('gz-run').textContent = '开始整理';
    document.getElementById('gz-run').disabled = false;

    document.getElementById('gallerize-modal').classList.add('show');
  },

  close() {
    if (this._running) return; // prevent close while running
    document.getElementById('gallerize-modal').classList.remove('show');
  },

  _syncModeUI() {
    document.querySelectorAll('.gz-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === this._mode);
    });
    const isRemote = this._mode === 'remote';
    document.getElementById('gz-remote-section').classList.toggle('show', isRemote);
    document.getElementById('gz-concurrency-section').classList.toggle('show', isRemote);
  },

  _setRunning(v) {
    this._running = v;
    document.getElementById('gz-run').disabled = v;
    document.getElementById('gz-cancel').disabled = v;
    document.getElementById('gz-close').style.pointerEvents = v ? 'none' : '';
    // Disable mode buttons during run
    document.querySelectorAll('.gz-mode-btn').forEach(btn => { btn.disabled = v; });
  },

  // Animate progress bar (fake progress until we get a response)
  _startFakeProgress() {
    const bar = document.getElementById('gz-progress-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    // Give browser a frame to apply the reset
    requestAnimationFrame(() => {
      bar.style.transition = 'width 25s cubic-bezier(0,.6,.3,1)';
      bar.style.width = '85%';
    });
  },

  _finishProgress(ok) {
    const bar = document.getElementById('gz-progress-bar');
    bar.style.transition = 'width .3s ease';
    bar.style.width = ok ? '100%' : '0%';
  },

  async run() {
    const path = this._readerDir();

    // Validate remote URL if needed
    if (this._mode === 'remote') {
      const url = this._remoteUrl.trim();
      if (!url) {
        document.getElementById('gz-remote-url').focus();
        showOsd('请填写远程服务地址', 2000);
        return;
      }
    }

    this._setRunning(true);

    // Show progress
    document.getElementById('gz-result').classList.remove('show');
    const progressEl = document.getElementById('gz-progress');
    progressEl.classList.add('show');
    document.getElementById('gz-progress-text').textContent = '正在处理，请稍候…';
    document.getElementById('gz-run').textContent = '处理中…';
    this._startFakeProgress();

    try {
      const result = await this._callApi(path);
      this._finishProgress(true);
      document.getElementById('gz-progress-text').textContent = '完成';
      this._showResult(result);

      // Refresh gallery if run succeeded and not skipped
      if (result.ok && !result.skipped) {
        setTimeout(() => {
          GalleryView.grid.innerHTML = '';
          GalleryView.loadPage();
        }, 800);
      }
    } catch (err) {
      this._finishProgress(false);
      document.getElementById('gz-progress-text').textContent = '请求失败: ' + err.message;
      this._showError(err.message);
    } finally {
      this._setRunning(false);
      document.getElementById('gz-run').textContent = '再次执行';
      document.getElementById('gz-run').disabled = false;
      document.getElementById('gz-cancel').textContent = '关闭';
      document.getElementById('gz-cancel').disabled = false;
    }
  },

  async _callApi(path) {
    const headers = { 'Content-Type': 'application/json' };

    // Always call local /api/gallerize.
    // In remote mode, pass remote_url so the server uses it for image conversion only.
    // Directory operations (flatten, cover, move) always run locally on this server.
    const bodyObj = { path, type: 'v1' };
    if (this._mode === 'remote') {
      const base = this._remoteUrl.replace(/\/+$/, '');
      bodyObj.remote_url = base + '/api/img';
      bodyObj.concurrency = this._concurrency;
    }
    // Append image conversion params if specified
    if (this._imgParams.w) bodyObj.w = parseInt(this._imgParams.w, 10);
    if (this._imgParams.h) bodyObj.h = parseInt(this._imgParams.h, 10);
    if (this._imgParams.fit) bodyObj.fit = this._imgParams.fit;
    if (this._imgParams.q) bodyObj.q = parseInt(this._imgParams.q, 10);

    const res = await fetch('/api/gallerize', {
      method: 'POST',
      headers,
      body: JSON.stringify(bodyObj),
      // Long timeout for large galleries
      signal: AbortSignal.timeout ? AbortSignal.timeout(300_000) : undefined,
    });

    const json = await res.json().catch(() => ({ ok: false, message: `HTTP ${res.status}` }));
    if (!res.ok) {
      throw new Error(json.message || `HTTP ${res.status}`);
    }
    return json;
  },

  _showResult(r) {
    const summaryEl = document.getElementById('gz-result-summary');
    const statEl    = document.getElementById('gz-stat-row');
    const errEl     = document.getElementById('gz-errors');

    if (r.skipped) {
      summaryEl.className = 'gz-result-summary ok';
      summaryEl.textContent = '✓ 已跳过（目录已完成整理，无需重复处理）';
      statEl.innerHTML = '';
      errEl.style.display = 'none';
    } else if (r.ok) {
      summaryEl.className = 'gz-result-summary ok';
      summaryEl.textContent = '✓ 整理完成';

      // Parse steps from the nested object returned by gallerize.lua
      const steps = r.steps || {};
      const parts = [];

      // move_non_images step
      const moveStep = steps.move_non_images;
      if (moveStep && moveStep.count !== undefined) {
        parts.push(`<span>移出非图片 <strong>${moveStep.count}</strong> 个</span>`);
      }

      // flatten step
      const flatStep = steps.flatten;
      if (flatStep && flatStep.dirs !== undefined) {
        const dirCount = Array.isArray(flatStep.dirs) ? flatStep.dirs.length : flatStep.dirs;
        parts.push(`<span>扁平化目录 <strong>${dirCount}</strong> 个</span>`);
      }

      // promote step
      const promoteStep = steps.promote;
      if (promoteStep && promoteStep.performed) {
        const dirName = promoteStep.dir ? ` (${promoteStep.dir})` : '';
        parts.push(`<span>单目录提升${escHtml(dirName)}</span>`);
      }

      // covers step — object: { "dirName": {generated, details}, ... }
      const coversStep = steps.covers;
      if (coversStep) {
        let coverOk = 0, coverFail = 0;
        for (const k of Object.keys(coversStep)) {
          const c = coversStep[k];
          if (c && c.generated) coverOk++; else coverFail++;
        }
        parts.push(`<span>封面 <strong>${coverOk}</strong> 个${coverFail ? `（失败 ${coverFail}）` : ''}</span>`);
      }

      // convert step — {processed, skipped, errors}
      const convStep = steps.convert;
      if (convStep) {
        if (convStep.processed !== undefined)
          parts.push(`<span>转换 <strong>${convStep.processed}</strong> 张</span>`);
        if (convStep.skipped !== undefined && convStep.skipped > 0)
          parts.push(`<span>跳过 <strong>${convStep.skipped}</strong> 张</span>`);
      }

      statEl.innerHTML = parts.join('');

      // Errors from convert step
      const errors = (convStep && convStep.errors) || r.errors || [];
      if (errors.length) {
        errEl.style.display = '';
        errEl.innerHTML = errors.map(e => {
          const src = e.file || e.src || '';
          const msg = e.error || String(e);
          return `<div>⚠ ${escHtml(src)}: ${escHtml(msg)}</div>`;
        }).join('');
      } else {
        errEl.style.display = 'none';
      }
    } else {
      summaryEl.className = 'gz-result-summary err';
      summaryEl.textContent = '✗ 失败: ' + (r.message || '未知错误');
      statEl.innerHTML = '';
      errEl.style.display = 'none';
    }

    document.getElementById('gz-result').classList.add('show');
  },

  _showError(msg) {
    const summaryEl = document.getElementById('gz-result-summary');
    summaryEl.className = 'gz-result-summary err';
    summaryEl.textContent = '✗ ' + msg;
    document.getElementById('gz-stat-row').innerHTML = '';
    document.getElementById('gz-errors').style.display = 'none';
    document.getElementById('gz-result').classList.add('show');
  },
};

/* ═══════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════ */
const Router = {
  /**
   * Parse URL parameters from location.href
   * Supports: path, page, reader
   * Example: /or-gallery?path=/my/dir&page=2&reader=/my/dir/gallery.zip
   */
  getParams() {
    // CRITICAL: Use location.href to get the full URL including fragment.
    // Browser decodes %23 to # and treats #... as fragment, which is NOT
    // included in location.search. We need to manually extract params
    // from the full URL to preserve # characters in directory names.
    const fullUrl = location.href;
    const params = { path: '/', page: 1, reader: null };

    // Extract path
    const pathMatch = fullUrl.match(/[?&]path=([^&]*)/);
    if (pathMatch) {
      params.path = decodeURIComponent(pathMatch[1]);
    }

    // Extract page (gallery page number)
    const pageMatch = fullUrl.match(/[?&]page=(\d+)/);
    if (pageMatch) {
      params.page = parseInt(pageMatch[1], 10) || 1;
    }

    // Extract reader (path to open directly in reader)
    const readerMatch = fullUrl.match(/[?&]reader=([^&]*)/);
    if (readerMatch) {
      params.reader = decodeURIComponent(readerMatch[1]);
    }

    return params;
  },

  getPath() {
    return this.getParams().path;
  },

  push(path, opts = {}) {
    // opts: { page, reader }
    let url = location.pathname + '?path=' + encodeURIComponent(path);
    if (opts.page && opts.page > 1) url += '&page=' + opts.page;
    if (opts.reader) url += '&reader=' + encodeURIComponent(opts.reader);
    history.pushState({ path, ...opts }, '', url);
    App.navigate(path, false, opts);
  },

  /** Push with a focusName hint — Gallery will restore focus to that card */
  pushWithFocus(path, focusName) {
    const url = location.pathname + '?path=' + encodeURIComponent(path);
    history.pushState({ path }, '', url);
    App.navigateToGallery(path, focusName);
  },

  replace(path, opts = {}) {
    let url = location.pathname + '?path=' + encodeURIComponent(path);
    if (opts.page && opts.page > 1) url += '&page=' + opts.page;
    if (opts.reader) url += '&reader=' + encodeURIComponent(opts.reader);
    history.replaceState({ path, ...opts }, '', url);
  },

  /** Update current URL with page number (for gallery pagination) */
  updatePage(page) {
    const params = this.getParams();
    let url = location.pathname + '?path=' + encodeURIComponent(params.path);
    if (page > 1) url += '&page=' + page;
    history.replaceState({ path: params.path, page }, '', url);
  },
};
window.addEventListener('popstate', e => {
  // Get params from URL (not from state, as state may be stale)
  const params = Router.getParams();
  App.navigate(params.path, true, { page: params.page, reader: params.reader });
});

  // ── Page cache ─────────────────────────────────────────────
  // Save page number when leaving gallery (entering reader)
  // Key: path, Value: pageNumber
  _pageCache: new Map(),
