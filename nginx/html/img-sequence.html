<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片序列编辑器</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --accent: #6c8aff;
    --accent2: #a07cff;
    --danger: #ff6b6b;
    --success: #4ecb71;
    --warn: #ffb86c;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .header-center { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
  .format-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .header-actions { display: flex; gap: 8px; margin-left: auto; }
  .btn {
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #5a7aee; }
  .btn.danger { border-color: var(--danger); color: var(--danger); background: transparent; }
  .btn.danger:hover { background: rgba(255,107,107,0.12); }
  .btn.sm { padding: 4px 8px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .file-input { display: none; }

  /* ── Progress bar ── */
  #progressBar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 36px;
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
    flex-shrink: 0;
  }
  #progressBar.active { display: flex; }
  #progressFill {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  #progressFill span {
    display: block;
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }

  /* ── Main grid area ── */
  .main-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text2);
    cursor: pointer;
  }
  .empty-icon {
    width: 80px; height: 80px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .empty-state p { font-size: 14px; }
  .empty-state p small { color: var(--text2); opacity: 0.7; }

  /* Image grid */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  /* Image card */
  .img-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .img-card:hover { border-color: var(--accent); }
  .img-card.drag-over { border-color: var(--success); box-shadow: 0 0 0 2px var(--success); }
  .img-card.dragging { opacity: 0.4; }
  .img-card .thumb-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .img-card .thumb-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  /* Card index badge */
  .img-card .card-index {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.4;
  }
  /* Rotate indicator overlay */
  .img-card .rotate-tag {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(108,138,255,0.85);
    color: #fff;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 4px;
    display: none;
  }
  .img-card .rotate-tag.visible { display: block; }
  /* Card body */
  .img-card .card-body {
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .img-card .card-name {
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overpression: ellipsis;
    max-width: 100%;
    display: block;
  }
  .img-card .card-dims {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.7;
  }
  .img-card .card-actions {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .img-card .card-actions .btn {
    flex: 1;
    padding: 3px 4px;
    font-size: 11px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.1s;
    text-align: center;
  }
  .img-card .card-actions .btn:hover { background: var(--border); color: var(--text); }
  .img-card .card-actions .btn.del:hover { background: rgba(255,107,107,0.2); color: var(--danger); border-color: var(--danger); }

  /* Drop indicator line */
  .drop-indicator {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
    display: none;
  }
  .drop-indicator.active { display: block; }

  /* Footer */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0 20px;
    height: 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--text2);
    flex-shrink: 0;
  }
  footer .hint { margin-left: auto; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>🖼️ 图片序列编辑器</h1>
  <div class="header-center">
    <select class="format-select" id="fmtSelect">
      <option value="pdf">📑 PDF 文档</option>
      <option value="zip">🗜️ ZIP 压缩包</option>
      <option value="cbz">📦 CBZ 漫画包</option>
    </select>
    <button class="btn primary" id="btnExport" disabled>⬇️ 导出</button>
  </div>
  <div class="header-actions">
    <button class="btn" id="btnAddMore">➕ 添加图片</button>
    <button class="btn danger" id="btnClearAll" disabled>🗑 清空</button>
  </div>
  <input type="file" class="file-input" id="fileInput" accept="image/*" multiple>
</header>

<!-- Progress bar -->
<div id="progressBar">
  <span id="progressText">准备中...</span>
  <div id="progressFill"><span></span></div>
</div>

<!-- Main -->
<div class="main-area" id="mainArea">

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🖼️</div>
    <p>点击添加图片，或拖放文件到这里</p>
    <p><small>支持 JPG / PNG / WebP / GIF / BMP / TIFF</small></p>
  </div>

  <!-- Image grid -->
  <div class="image-grid" id="imageGrid" style="display:none"></div>

</div>

<!-- Footer -->
<footer>
  <span id="footerCount">0 张图片</span>
  <span class="hint">💡 拖动卡片可排序 | 点击 🔄 旋转单张图片</span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
let images = [];  // [{ id, file, name, mimeType, w, h, rotation (0|90|180|270), thumb (dataURL) }]
let nextId = 0;
let draggedId = null;
let fmtSelectEl = document.getElementById('fmtSelect');

// ═══════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════
const mainArea    = document.getElementById('mainArea');
const emptyState  = document.getElementById('emptyState');
const imageGrid   = document.getElementById('imageGrid');
const fileInput   = document.getElementById('fileInput');
const btnExport   = document.getElementById('btnExport');
const btnClearAll = document.getElementById('btnClearAll');
const btnAddMore  = document.getElementById('btnAddMore');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const progressFill = document.querySelector('#progressFill span');

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════
function render() {
  if (images.length === 0) {
    emptyState.style.display = 'flex';
    imageGrid.style.display = 'none';
    btnExport.disabled = true;
    btnClearAll.disabled = true;
    document.getElementById('footerCount').textContent = '0 张图片';
    return;
  }
  emptyState.style.display = 'none';
  imageGrid.style.display = 'grid';
  btnExport.disabled = false;
  btnClearAll.disabled = false;
  document.getElementById('footerCount').textContent = `${images.length} 张图片`;

  imageGrid.innerHTML = '';
  images.forEach((img, idx) => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.dataset.id = img.id;
    card.draggable = true;
    card.title = img.name;

    const rot = img.rotation || 0;
    const rotClass = rot !== 0 ? ' visible' : '';
    const rotLabel = rot === 0 ? '' : `🔄 ${rot}°`;

    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${img.thumb}" style="transform:rotate(${rot}deg)" draggable="false">
        <span class="card-index">${idx + 1}</span>
        <span class="rotate-tag${rotClass}">${rotLabel}</span>
      </div>
      <div class="card-body">
        <span class="card-name" title="${img.name}">${img.name}</span>
        <span class="card-dims">${img.w} × ${img.h}</span>
        <div class="card-actions">
          <button class="btn rot-cw" data-id="${img.id}" title="顺时针旋转90°">🔄</button>
          <button class="btn rot-ccw" data-id="${img.id}" title="逆时针旋转90°">↶</button>
          <button class="btn del" data-id="${img.id}" title="移除">✕</button>
        </div>
      </div>
    `;

    imageGrid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
// Add images
// ═══════════════════════════════════════════════════════════
function addImages(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!arr.length) return;
  let pending = arr.length;
  arr.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images.push({
          id: nextId++,
          file,
          name: file.name,
          mimeType: file.type || 'image/png',
          thumb: e.target.result,
          w: img.naturalWidth,
          h: img.naturalHeight,
          rotation: 0
        });
        pending--;
        if (pending === 0) render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════════════
// Per-image operations
// ═══════════════════════════════════════════════════════════
function rotateById(id, delta) {
  const item = images.find(i => i.id === id);
  if (!item) return;
  item.rotation = ((item.rotation || 0) + delta + 360) % 360;
  render();
}

function removeById(id) {
  images = images.filter(i => i.id !== id);
  render();
}

function clearAll() {
  images = [];
  render();
}

// ═══════════════════════════════════════════════════════════
// Drag & Drop reorder — event delegation on imageGrid
// ═══════════════════════════════════════════════════════════
imageGrid.addEventListener('dragstart', e => {
  const card = e.target.closest('.img-card');
  if (!card) return;
  draggedId = parseInt(card.dataset.id);
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedId); // required for Firefox
  e.stopPropagation();
});

imageGrid.addEventListener('dragend', e => {
  const card = e.target.closest('.img-card');
  if (card) card.classList.remove('dragging');
  document.querySelectorAll('.img-card').forEach(c => c.classList.remove('drag-over'));
  draggedId = null;
});

imageGrid.addEventListener('dragover', e => {
  const card = e.target.closest('.img-card');
  if (!card || parseInt(card.dataset.id) === draggedId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.img-card').forEach(c => c.classList.remove('drag-over'));
  card.classList.add('drag-over');
  e.stopPropagation();
});

imageGrid.addEventListener('dragleave', e => {
  const card = e.target.closest('.img-card');
  if (!card) return;
  // Only remove if actually leaving the card (not entering a child)
  const related = e.relatedTarget;
  if (!related || !card.contains(related)) {
    card.classList.remove('drag-over');
  }
});

imageGrid.addEventListener('drop', e => {
  e.preventDefault();
  const card = e.target.closest('.img-card');
  if (!card) return;
  card.classList.remove('drag-over');
  const targetId = parseInt(card.dataset.id);
  if (!draggedId || targetId === draggedId) return;
  const fromIdx = images.findIndex(i => i.id === draggedId);
  const toIdx   = images.findIndex(i => i.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = images.splice(fromIdx, 1);
  images.splice(toIdx, 0, moved);
  draggedId = null;
  render();
});

// Button events — delegation on imageGrid
imageGrid.addEventListener('click', e => {
  const btn = e.target.closest('[data-id]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  if (btn.classList.contains('rot-cw')) rotateById(id, 90);
  else if (btn.classList.contains('rot-ccw')) rotateById(id, -90);
  else if (btn.classList.contains('del')) removeById(id);
});

// ═══════════════════════════════════════════════════════════
// Canvas helpers
// ═══════════════════════════════════════════════════════════
function loadImageToCanvas(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width  = img.naturalWidth;
      c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      resolve({ canvas: c, w: img.naturalWidth, h: img.naturalHeight });
    };
    img.onerror = reject;
    img.src = src;
  });
}

function rotatedCanvas(c, w, h, rotation) {
  rotation = ((rotation || 0) % 360 + 360) % 360;
  if (rotation === 0) return c;
  const is90 = rotation === 90 || rotation === 270;
  const newW = is90 ? h : w;
  const newH = is90 ? w : h;
  const nc = document.createElement('canvas');
  nc.width = newW; nc.height = newH;
  const ctx = nc.getContext('2d');
  ctx.translate(newW / 2, newH / 2);
  ctx.rotate((rotation * Math.PI) / 180);
  ctx.drawImage(c, -w / 2, -h / 2);
  return nc;
}

// ═══════════════════════════════════════════════════════════
// Render item to final canvas (with rotation applied)
// ═══════════════════════════════════════════════════════════
async function renderItem(item) {
  const { canvas: c, w, h } = await loadImageToCanvas(item.thumb);
  const rotated = rotatedCanvas(c, w, h, item.rotation || 0);
  return rotated;
}

// ═══════════════════════════════════════════════════════════
// Export
// ═══════════════════════════════════════════════════════════
async function exportAll() {
  if (!images.length) return;
  const fmt = fmtSelectEl.value;
  setProgress(0, `正在准备 ${images.length} 张图片...`);

  try {
    if (fmt === 'pdf') {
      await exportPDF();
    } else {
      await exportZip(fmt);
    }
  } catch(e) {
    hideProgress();
    alert('导出失败: ' + e.message);
    console.error(e);
  }
}

async function exportPDF() {
  const { jsPDF } = window.jspdf;

  // First image determines page size & orientation
  const firstRotated = await renderItem(images[0]);
  const isLandscape = firstRotated.width > firstRotated.height;
  const pdf = new jsPDF({
    orientation: isLandscape ? 'landscape' : 'portrait',
    unit: 'px',
    format: [firstRotated.width, firstRotated.height]
  });

  for (let i = 0; i < images.length; i++) {
    const item = images[i];
    const canvas = await renderItem(item);
    const imgData = canvas.toDataURL('image/png');
    if (i > 0) {
      const isL = canvas.width > canvas.height;
      pdf.addPage([canvas.width, canvas.height], isL ? 'landscape' : 'portrait');
    }
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
    setProgress((i + 1) / images.length * 100, `处理第 ${i+1} / ${images.length} 张...`);
  }

  hideProgress();
  const blob = pdf.output('blob');
  downloadBlob(blob, `sequence_${dateStamp()}.pdf`);
}

async function exportZip(fmt) {
  const zip = new JSZip();
  const ext = fmt === 'cbz' ? 'cbz' : 'zip';
  const folder = zip.folder('images');

  for (let i = 0; i < images.length; i++) {
    const item = images[i];
    const canvas = await renderItem(item);
    // Use original MIME type, fall back to PNG
    const mimeType = item.mimeType || 'image/png';
    const blob = await new Promise(r => canvas.toBlob(r, mimeType));
    const pad = String(i + 1).padStart(3, '0');
    // Keep original file extension, swap only if unknown
    const origExt = item.name.split('.').pop().toLowerCase();
    const knownExts = ['jpg','jpeg','png','webp','gif','bmp'];
    const safeExt = knownExts.includes(origExt) ? origExt : 'png';
    const baseName = item.name.replace(/\.[^.]+$/, '');
    folder.file(`${pad}_${baseName}.${safeExt}`, blob);
    setProgress((i + 1) / images.length * 100, `处理第 ${i+1} / ${images.length} 张...`);
  }

  hideProgress();
  const zBlob = await zip.generateAsync({ type: 'blob' });
  downloadBlob(zBlob, `sequence_${dateStamp()}.${ext}`);
}

function setProgress(pct, text) {
  progressBar.classList.add('active');
  progressText.textContent = text;
  progressFill.style.width = Math.round(pct) + '%';
}
function hideProgress() {
  progressBar.classList.remove('active');
  progressFill.style.width = '0%';
}
function dateStamp() {
  return new Date().toISOString().slice(0, 10);
}
function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ═══════════════════════════════════════════════════════════
// Events
// ═══════════════════════════════════════════════════════════
btnAddMore.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files.length) { addImages(e.target.files); e.target.value = ''; }
});
btnExport.addEventListener('click', exportAll);
btnClearAll.addEventListener('click', clearAll);

// Global drag & drop (add more files)
mainArea.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
mainArea.addEventListener('drop', e => {
  e.preventDefault();
  const files = e.dataTransfer.files;
  if (files.length) addImages(files);
});

// Empty state click to add
emptyState.addEventListener('click', () => fileInput.click());

// ═══════════════════════════════════════════════════════════
// Load images from gallery URL parameter (?gallery=<base64>)
// Called when opened from reader with a gallery of images
// ═══════════════════════════════════════════════════════════
async function loadFromGalleryParam() {
  const params = new URLSearchParams(window.location.search);
  const gallery = params.get('gallery');
  if (!gallery) return;
  try {
    const urls = JSON.parse(decodeURIComponent(atob(gallery)));
    if (!Array.isArray(urls) || urls.length === 0) return;
    setProgress(0, `正在加载 ${urls.length} 张图片...`);
    let loaded = 0;
    for (const url of urls) {
      try {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        // Draw to canvas to get dimensions
        const c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const thumb = c.toDataURL('image/png');
        const name = (url.split('?')[0]).split('/').pop() || 'image';
        // Infer MIME type from URL path extension
        const ext = name.split('.').pop().toLowerCase();
        const mimeFromExt = { jpg: 'image/jpeg', jpeg: 'image/jpeg', webp: 'image/webp', png: 'image/png', gif: 'image/gif', bmp: 'image/bmp', tiff: 'image/tiff' };
        const mimeType = mimeFromExt[ext] || 'image/png';
        images.push({
          id: nextId++,
          file: null,
          name,
          mimeType,
          thumb,
          w: img.naturalWidth,
          h: img.naturalHeight,
          rotation: 0
        });
        loaded++;
        setProgress(loaded / urls.length * 100, `加载第 ${loaded} / ${urls.length} 张...`);
      } catch(e) {
        console.warn('Failed to load image:', url, e);
      }
    }
    hideProgress();
    render();
    if (images.length > 0) {
      document.getElementById('footerCount').textContent = `${images.length} 张图片（已从 Gallery 导入）`;
    }
  } catch(e) {
    console.error('Failed to parse gallery param:', e);
  }
}

// Init: load from URL param then render
(async () => {
  await loadFromGalleryParam();
  render();
})();
</script>
</body>
</html>
