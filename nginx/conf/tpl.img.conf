# в”Ђв”Ђ /img/ Location Template в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Dynamic image processing via imgproxy with nginx proxy_cache
# URL: /img/<path>?w=400&h=300&fit=cover&fmt=webp&q=80
#
# Cache configuration (via environment variables):
#   - OR_IMG_CACHE_PATH:  cache directory (default /data/cache)
#   - OR_IMG_CACHE_MAX:   max cache size (default 2g)
#   - OR_IMG_CACHE_INACTIVE: inactive time before removal (default 60d)
#   - OR_IMG_CACHE_VALID: cache validity (default 2d)
#
# imgproxy configuration (via environment variables):
#   - IMGPROXY_HOST: imgproxy service hostname (default: imgproxy)
#   - IMGPROXY_PORT: imgproxy service port (default: 8080)
#
# Architecture:
#   /img/<path>?params в†’ proxy_pass в†’ imgproxy в†’ shared /data directory
#   imgproxy reads from ${IMGPROXY_LOCAL_FILESYSTEM_ROOT}=/data
#   yot (nginx proxy_cache) handles all caching, imgproxy cache is disabled
#
# imgproxy URL format:
#   /insecure/<processing>/plain/local:///<rel_path>
#   where <rel_path> is relative to /data (e.g. images/photo.jpg в†’ /data/images/photo.jpg)
#
# NOTE: Use triple-slash local:/// to avoid imgproxy treating first path segment as hostname
#
# Generated from: nginx/conf/tpl.img.conf -> nginx/conf/default_app/img.conf
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

# External location: handles caching via proxy_pass to imgproxy
location /img/ {
    gzip off;

    # в”Ђв”Ђ Nginx proxy_cache configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    proxy_cache img_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;
    proxy_cache_background_update ${OR_IMG_CACHE_BACKGROUND_UPDATE};
    proxy_cache_revalidate on;
    proxy_cache_lock on;
    proxy_cache_use_stale ${OR_IMG_CACHE_USE_STALE};

    # Cache validity (from environment variable OR_IMG_CACHE_VALID)
    proxy_cache_valid 200 ${OR_IMG_CACHE_VALID};
    proxy_cache_valid 404 1m;

    # Add cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # в”Ђв”Ђ Build imgproxy URL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Extract relative path: /img/foo/bar.jpg в†’ foo/bar.jpg
    set $img_rel_path "";
    set $imgp_width "";
    set $imgp_height "";
    set $imgp_fit "contain";
    set $imgp_fmt "";
    set $imgp_q "";

    # Parse path from URI (strips /img/ prefix)
    if ($uri ~ ^/img/(.+)$) {
        set $img_rel_path $1;
    }

    # Width
    if ($arg_w ~ "^[0-9]+$") {
        set $imgp_width $arg_w;
    }
    # Height
    if ($arg_h ~ "^[0-9]+$") {
        set $imgp_height $arg_h;
    }
    # Fit mode
    if ($arg_fit != "") {
        set $imgp_fit $arg_fit;
    }
    # Format
    if ($arg_fmt != "") {
        set $imgp_fmt $arg_fmt;
    }
    # Quality
    if ($arg_q ~ "^[0-9]+$") {
        set $imgp_q $arg_q;
    }

    # Build imgproxy URL via Lua
    set_by_lua $imgproxy_processing '
        local parts = {}
        if ngx.var.imgp_width ~= "" then
            table.insert(parts, "width:" .. ngx.var.imgp_width)
        end
        if ngx.var.imgp_height ~= "" then
            table.insert(parts, "height:" .. ngx.var.imgp_height)
        end
        if ngx.var.imgp_fit ~= "" and ngx.var.imgp_fit ~= "contain" then
            table.insert(parts, "fit:" .. ngx.var.imgp_fit)
        end
        if ngx.var.imgp_fmt ~= "" then
            table.insert(parts, "format:" .. ngx.var.imgp_fmt)
        end
        if ngx.var.imgp_q ~= "" then
            table.insert(parts, "quality:" .. ngx.var.imgp_q)
        end
        return table.concat(parts, "/")
    ';

    # Proxy to imgproxy
    set $imgproxy_host ${IMGPROXY_HOST};
    set $imgproxy_port ${IMGPROXY_PORT};

    proxy_pass http://$imgproxy_host:$imgproxy_port/insecure/$imgproxy_processing/plain/local:///$img_rel_path;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Imgproxy-Path $img_rel_path;
}
