# ── /img/ Location Template ─────────────────────────────────────────────────
# Dynamic image processing via imgproxy with nginx proxy_cache
# URL: /img/<path>?w=400&h=300&fit=cover&fmt=webp&q=80
#
# Cache configuration (via environment variables):
#   - OR_IMG_CACHE_PATH:  cache directory (default /data/cache)
#   - OR_IMG_CACHE_MAX:   max cache size (default 2g)
#   - OR_IMG_CACHE_INACTIVE: inactive time before removal (default 60d)
#   - OR_IMG_CACHE_VALID: cache validity (default 2d)
#
# Architecture:
#   /img/<path>?params → proxy_pass → imgproxy → shared /data directory
#   imgproxy reads from ${IMGPROXY_LOCAL_FILESYSTEM_ROOT}=/data
#   yot (nginx proxy_cache) handles all caching, imgproxy cache is disabled
#
# imgproxy URL format:
#   /insecure/<processing>/plain/local:///<rel_path>
#   where <rel_path> is relative to /data (e.g. images/photo.jpg → /data/images/photo.jpg)
#
# NOTE: Use triple-slash local:/// to avoid imgproxy treating first path segment as hostname
#
# Generated from: nginx/conf/tpl.img.conf -> nginx/conf/default_app/img.conf
# ─────────────────────────────────────────────────────────────────────────────

# External location: handles caching via proxy_pass to imgproxy
location /img/ {
    gzip off;

    # ── Nginx proxy_cache configuration ─────────────────────────────────────
    proxy_cache img_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;
    proxy_cache_background_update ${OR_IMG_CACHE_BACKGROUND_UPDATE};
    proxy_cache_revalidate on;
    proxy_cache_lock on;
    proxy_cache_use_stale ${OR_IMG_CACHE_USE_STALE};

    # Cache validity (from environment variable OR_IMG_CACHE_VALID)
    proxy_cache_valid 200 ${OR_IMG_CACHE_VALID};
    proxy_cache_valid 404 1m;

    # Add cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # ── Process image via Lua HTTP client ───────────────────────────────────────
    # Use Lua's cosocket to make direct HTTP request to imgproxy
    # This avoids nginx's proxy_pass URL parsing issues with imgproxy's local:// URL scheme
    content_by_lua_block {
        local imgproxy_client = require("lib.imgproxy_client")

        -- Extract path from URI (strips /img/ prefix)
        local uri = ngx.var.uri
        local rel_path = uri:match("^/img/(.+)$")
        if not rel_path then
            ngx.status = 404
            ngx.print("path not found")
            return
        end

        -- Get query parameters
        local args = ngx.req.get_uri_args()
        local w = tonumber(args.w) or 0
        local h = tonumber(args.h) or 0
        local fit = args.fit or "contain"
        local fmt = args.fmt or ""
        local q = tonumber(args.q) or 82

        -- Call imgproxy
        local result, err, status = imgproxy_client.process_local("/webdav", rel_path, {
            w = w,
            h = h,
            fit = fit,
            fmt = fmt,
            q = q
        })

        if not result then
            ngx.log(ngx.ERR, "[img] imgproxy error: ", err)
            ngx.status = status or 500
            ngx.print(err or "internal error")
            return
        end

        -- Send response to client
        ngx.status = 200
        ngx.header["Content-Type"] = result.headers["Content-Type"] or "application/octet-stream"
        ngx.header["Content-Length"] = #result.body
        ngx.header["Cache-Control"] = "public, max-age=86400"
        ngx.print(result.body)
    }
}

# ── /imgproxy/zip/ Location ─────────────────────────────────────────────────────
# Process images inside ZIP/CBZ archives via imgproxy using HTTP source
# URL: /imgproxy/zip/<zip_rel>/<entry>?w=400&h=300&fit=cover&fmt=webp&q=80
#
# Architecture:
#   /imgproxy/zip/<zip_rel>/<entry>?params
#     → nginx lua constructs HTTP URL: http://yot:5080/zip/<zip_rel>/<entry>
#     → imgproxy fetches from internal /zip/ endpoint (nginx serves ZIP content)
#     → imgproxy processes and returns image
#   nginx proxy_cache handles caching (same as /img/)
# ─────────────────────────────────────────────────────────────────────────────
location /imgproxy/zip/ {
    gzip off;

    # ── Nginx proxy_cache configuration (same as /img/) ───────────────────────
    proxy_cache img_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;
    proxy_cache_background_update ${OR_IMG_CACHE_BACKGROUND_UPDATE};
    proxy_cache_revalidate on;
    proxy_cache_lock on;
    proxy_cache_use_stale ${OR_IMG_CACHE_USE_STALE};

    # Cache validity
    proxy_cache_valid 200 ${OR_IMG_CACHE_VALID};
    proxy_cache_valid 404 1m;

    # Add cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # ── Process image via Lua HTTP client ───────────────────────────────────────
    content_by_lua_block {
        local imgproxy_client = require("lib.imgproxy_client")

        -- Extract path from URI (strips /imgproxy/zip/ prefix)
        -- URL format: /imgproxy/zip/<zip_rel>/<entry>
        -- Example: /imgproxy/zip/archives/book.cbz/images/cover.jpg
        local uri = ngx.var.uri
        local rel_path = uri:match("^/imgproxy/zip/(.+)$")
        if not rel_path or rel_path == "" then
            ngx.status = 404
            ngx.print("path not found")
            return
        end

        -- rel_path is now: archives/book.cbz/images/cover.jpg
        -- IMPORTANT: ngx.var.uri is already properly encoded (single-encoded).
        -- DO NOT re-encode it, otherwise special chars like [ ] become %5B %5D
        -- which will cause zipfs to fail finding the actual files.
        -- Direct use of rel_path preserves correct encoding for imgproxy → yot → zipfs chain.
        local internal_zip_url = "http://yot:80/zip/" .. rel_path

        -- Get query parameters
        local args = ngx.req.get_uri_args()
        local w = tonumber(args.w) or 0
        local h = tonumber(args.h) or 0
        local fit = args.fit or "contain"
        local fmt = args.fmt or ""
        local q = tonumber(args.q) or 82

        -- Call imgproxy via HTTP URL
        local result, err, status = imgproxy_client.process_http(internal_zip_url, {
            w = w,
            h = h,
            fit = fit,
            fmt = fmt,
            q = q
        })

        if not result then
            ngx.log(ngx.ERR, "[imgproxy/zip] imgproxy error: ", err)
            ngx.status = status or 500
            ngx.print(err or "internal error")
            return
        end

        -- Send response to client
        ngx.status = 200
        ngx.header["Content-Type"] = result.headers["Content-Type"] or "application/octet-stream"
        ngx.header["Content-Length"] = #result.body
        ngx.header["Cache-Control"] = "public, max-age=86400"
        ngx.print(result.body)
    }
}

# ── /imgproxy-zip/ Location Template ───────────────────────────────────────────
# Direct image processing for ZIP/CBZ archive entries via imgproxy + zipfs webdav
# URL: /imgproxy-zip/<zip_rel>/<entry>?w=400&h=300&fit=cover&fmt=webp&q=80
#
# Architecture:
#   /imgproxy-zip/<zip_rel>/<entry>?params
#     → imgproxy "/insecure/<processing>/plain/local:///webdav/<zip_rel>/<entry>"
#     → nginx webdav (intercepted by zipfs transparent rewrite)
#     → zipfs extracts entry from ZIP and returns binary data
#     → imgproxy processes and returns image
#   nginx proxy_cache handles caching (same as /img/)
#
# Note: imgproxy accesses zip content through zipfs's webdav transparent integration,
#       no RAM disk or temp files needed.
# ─────────────────────────────────────────────────────────────────────────────
location /imgproxy-zip/ {
    gzip off;

    # ── Nginx proxy_cache configuration (same as /img/) ───────────────────────
    proxy_cache img_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;
    proxy_cache_background_update ${OR_IMG_CACHE_BACKGROUND_UPDATE};
    proxy_cache_revalidate on;
    proxy_cache_lock on;
    proxy_cache_use_stale ${OR_IMG_CACHE_USE_STALE};

    # Cache validity
    proxy_cache_valid 200 ${OR_IMG_CACHE_VALID};
    proxy_cache_valid 404 1m;

    # Add cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # ── Process image via Lua HTTP client ───────────────────────────────────────
    content_by_lua_block {
        local imgproxy_client = require("lib.imgproxy_client")

        -- Extract path from URI (strips /imgproxy-zip/ prefix)
        -- URL format: /imgproxy-zip/<zip_rel>/<entry>
        -- Example: /imgproxy-zip/archives/book.cbz/cover.jpg
        local uri = ngx.var.uri
        local rel_path = uri:match("^/imgproxy-zip/(.+)$")
        if not rel_path or rel_path == "" then
            ngx.status = 404
            ngx.print("path not found")
            return
        end

        -- rel_path is now: archives/book.cbz/cover.jpg
        -- imgproxy will access it via local:///webdav/archives/book.cbz/cover.jpg
        -- zipfs transparent webdav will intercept and extract from ZIP

        -- Get query parameters
        local args = ngx.req.get_uri_args()
        local w = tonumber(args.w) or 0
        local h = tonumber(args.h) or 0
        local fit = args.fit or "contain"
        local fmt = args.fmt or ""
        local q = tonumber(args.q) or 82

        -- Call imgproxy via webdav (zipfs will intercept and extract from ZIP)
        local result, err, status = imgproxy_client.process_local("/webdav", rel_path, {
            w = w,
            h = h,
            fit = fit,
            fmt = fmt,
            q = q
        }, true)  -- use_webdav=true

        if not result then
            ngx.log(ngx.ERR, "[imgproxy-zip] imgproxy error: ", err)
            ngx.status = status or 500
            ngx.print(err or "internal error")
            return
        end

        -- Send response to client
        ngx.status = 200
        ngx.header["Content-Type"] = result.headers["Content-Type"] or "application/octet-stream"
        ngx.header["Content-Length"] = #result.body
        ngx.header["Cache-Control"] = "public, max-age=86400"
        ngx.print(result.body)
    }
}
