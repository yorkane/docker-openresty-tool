# Media preview overlay script — served from nginx/html/, cached by browser
location = /__or_preview.js {
    root       html;
    add_header Cache-Control "public, max-age=86400, must-revalidate";
    add_header Content-Type  "application/javascript; charset=utf-8";
    etag       on;
    access_log off;
}

# Gallery SPA — image/manga gallery browser (depends on /api/ls/, /zip/, /img/)
location = /__or_gallery {
    root       html;
    try_files  /__or_gallery.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
    add_header Content-Type  "text/html; charset=utf-8";
    etag       off;
    access_log off;
}

