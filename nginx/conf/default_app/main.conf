}
    set $destination $http_destination; 
    set $new_path "";
    set $webdav_root "/webdav";
    set $checkPropfind "";

location / {
    client_body_timeout    120;
    send_timeout           100;
    client_max_body_size   2000m;

    # ── Media preview injection ────────────────────────────────────────────
    # Appends a tiny <script> before </body> in every HTML directory listing.
    # Works with fancyindex, autoindex, and any HTML response served from /.
    header_filter_by_lua_block {
        require('lib.preview_inject').filter()
    }
    body_filter_by_lua_block {
        require('lib.preview_inject').body()
    }
    # ──────────────────────────────────────────────────────────────────────

    rewrite_by_lua_block {
        require('lib.basic_auth').handle(require('env').auth_conf)
        -- ZIP transparent WebDAV interception
        -- Only intercepts requests that target a path *inside* a ZIP archive.
        -- Requests for the ZIP file itself (no sub-path after the extension) are
        -- NOT intercepted so that WebDAV clients can download / PROPFIND the raw
        -- ZIP file as a normal file.
        -- Controlled by OR_ZIPFS_TRANSPARENT env var (default: true/enabled)
        local zipfs = require('lib.zipfs')
        local uri = ngx.var.uri
        if zipfs.is_transparent_enabled() and zipfs.is_zip_request(uri) then
            -- Check whether the URI has a sub-path after the zip extension.
            -- find_zip_boundary returns the end-index of the extension in uri.
            local zip_end = zipfs.find_zip_boundary(uri)
            -- inner: everything after the extension boundary, stripped of leading slashes
            local inner = zip_end and uri:sub(zip_end + 1):gsub("^/+", "") or ""

            -- Only intercept when there IS an inner path (accessing ZIP contents).
            -- When inner == "" the client wants the ZIP file itself; let nginx handle it.
            if inner ~= "" then
                local method = ngx.req.get_method()
                if method == "PROPFIND" then
                    local depth = ngx.req.get_headers()["Depth"] or "1"
                    local xml = zipfs.webdav_propfind(ngx.var.webdav_root, uri, depth)
                    if xml then
                        ngx.status = 207
                        ngx.header["Content-Type"] = "application/xml; charset=utf-8"
                        ngx.header["DAV"] = "1, 2"
                        ngx.print(xml)
                        return ngx.exit(207)
                    end
                elseif method == "GET" or method == "HEAD" then
                    -- handle_transparent also guards against inner=="" internally,
                    -- but the outer check already ensures inner != "" here.
                    if zipfs.handle_transparent(ngx.var.webdav_root) then
                        return ngx.exit(ngx.OK)
                    end
                end
            end
        end
        -- require('klib.dump').logs(ngx.req.get_headers())  -- klib not bundled in this build
    }
    dav_ext_lock zone=webdav;
    dav_methods		PUT MKCOL;
    dav_ext_methods	OPTIONS LOCK UNLOCK;

      autoindex		on;
      autoindex_exact_size	on;
      autoindex_localtime	on;
      
      fancyindex on;
      fancyindex_exact_size off;
      fancyindex_localtime on;
      # fancyindex_name_length removed in newer ngx-fancyindex (no longer needed,
      # the module now supports full-length filenames by default)
      
      root			$webdav_root;
      
      error_page		599 = @propfind_handler;
      error_page		598 = @delete_handler;
      error_page		597 = @copy_move_handler;
      error_page		596 = @propfind_withdepth_handler;
      
      open_file_cache		off;
      
      if ($request_method != OPTIONS) {
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Accept-Charset,X-Accept,origin,accept,if-match,destination,overwrite' always;
        add_header 'Access-Control-Expose-Headers' 'ETag' always;
        add_header 'Access-Control-Max-Age' 1728000 always;
      }
      
      if ($request_method = OPTIONS) {
        # CORS
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK';
        add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Accept-Charset,X-Accept,origin,accept,if-match,destination,overwrite';
        add_header 'Access-Control-Expose-Headers' 'ETag';
        add_header 'Access-Control-Max-Age' 1728000;
        
        # WebDAV compliance
        add_header	Allow 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK';
        add_header	DAV '1, 2';
        return 200;
      }
      
      
      if ($request_method = PROPFIND) { # Normal flow for PROPFIND
        set $checkPropfind "propfind";
      }
      
      if ($http_depth = 0) { # FIX for Depth = 0 allowed unauthenticated
        set $checkPropfind "${checkPropfind}+withDepth";
      }
      
      if ($http_depth = 1) { # FIX for Depth = 1 allowed unauthenticated
        set $checkPropfind "${checkPropfind}+withDepth";
      }
      
      if ($checkPropfind = "propfind") { # Normal flow for PROPFIND
        return 599;
      } 
      
      if ($checkPropfind = "propfind+withDepth") { # FIX for Depth = 1 allowed unauthenticated
        return 596;
      }   
      
      if ($request_method = PROPPATCH) { # Unsupported, allways return OK.
        add_header	Content-Type 'text/xml';
        return		207 '<?xml version="1.0"?><a:multistatus xmlns:a="DAV:"><a:response><a:propstat><a:status>HTTP/1.1 200 OK</a:status></a:propstat></a:response></a:multistatus>';
      }
      
      if ($request_method = MKCOL) { # Microsoft specific handle: add trailing slash.
        rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
      }
      
      if ($request_method = DELETE) {
        return 598;
      }
      
      if ($request_method = COPY) {
        return 597;
      }
      
      if ($request_method = MOVE) {
        return 597;
      }      
    }
    
    location @propfind_handler {
      internal;
      open_file_cache	off;
      if (!-e $webdav_root/$uri) { # Microsoft specific handle.
        return 404;
      }
      root			$webdav_root;
      dav_ext_methods		PROPFIND;
    }
    
    location @propfind_withdepth_handler { # Same as above but authenticated.
    rewrite_by_lua_block {
        require('lib.basic_auth').handle(require('env').auth_conf)
    }
      internal;
      open_file_cache	off;
      if (!-e $webdav_root/$uri) { # Microsoft specific handle.
        return 404;
      }
      root			$webdav_root;
      dav_ext_methods		PROPFIND;
    }
    
    location @delete_handler {
    rewrite_by_lua_block {
        require('lib.basic_auth').handle(require('env').auth_conf)
    }
      internal;
      open_file_cache	off;
      if ($destination ~ ^https?://(?<captured_path>.*)$) {
        set $new_path $captured_path;
        more_set_input_headers "Destination: http://$new_path";
      }
      if (-d $webdav_root/$uri) { # Microsoft specific handle: Add trailing slash to dirs.
        more_set_input_headers "Destination: http://$new_path/";
        rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
      }
      
      root			$webdav_root;
      dav_methods		DELETE;
    }

    location @copy_move_handler {
    rewrite_by_lua_block {
        require('lib.basic_auth').handle(require('env').auth_conf)
    }
      internal;
      open_file_cache	off;
      
      if ($destination ~ ^https?://(?<captured_path>.*)$) {
        set $new_path $captured_path;
        more_set_input_headers "Destination: http://$new_path";
      }
      
      if (-d $webdav_root/$uri) { # Microsoft specific handle: Add trailing slash to dirs.
        more_set_input_headers "Destination: http://$new_path/";
        rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
      }
      
      root			$webdav_root;
      dav_methods		COPY MOVE;
    }
    

# ── Extra locations (vips image processing, zipfs, wol, etc.) ──

# /img/ — Dynamic image processing via libvips (lua-vips) with nginx proxy_cache
# Generated from: nginx/conf/tpl.img.conf -> nginx/conf/default_app/img.conf
include default_app/img.conf;

# /api/upload/ — Upload a file (raw body, creates parent dirs automatically)
# Method: POST /api/upload/<path>
location /api/upload/ {
    client_max_body_size 0;   # no upload size cap at this location (inherits if 0 doesn't work)
    content_by_lua_block {
        if ngx.req.get_method() ~= "POST" then
            ngx.status = 405
            ngx.header["Allow"] = "POST"
            ngx.header["Content-Type"] = "application/json; charset=utf-8"
            ngx.print('{"error":"method_not_allowed","message":"use POST"}')
            ngx.exit(405)
        end
        require('lib.fileapi').handle_upload(ngx.var.webdav_root)
    }
}

location /__tapd {
    access_log off;
    log_not_found off;
    allow 127.0.0.1;
    allow 172.16.0.0/12; # docker
    allow 10.0.0.0/8; # internal network
    allow 192.168.0.0/16; # internal network
    deny  all;
	content_by_lua_block {
		require('lib.tap').tapd()
}
}
location /zipdbg/ {
    content_by_lua_block {
        local root = ngx.var.webdav_root or 'NIL'
        local uri = ngx.var.uri
        local ok, zipfs = pcall(require, 'lib.zipfs')
        if not ok then ngx.say('require error: '..tostring(zipfs)); return end
        ngx.say('root='..root)
        ngx.say('uri='..uri)
        ngx.say('zipfs loaded ok')
    }
}
