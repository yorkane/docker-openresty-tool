        require('lib.zipfs').handle(ngx.var.webdav_root)
    }
}

# /api/ls/ — Directory listing JSON API
# URL: /api/ls/<path>?page=1&page_size=50
# Returns JSON: {path, page, page_size, total, items:[{name,type,size,mtime,ctime}]}
# type: "dir" | "file" | "zip"  (zip only when OR_ZIPFS_TRANSPARENT is enabled)
location /api/ls/ {
    content_by_lua_block {
        require('lib.dirapi').handle(ngx.var.webdav_root)
    }
}

location /api/ls {
    content_by_lua_block {
        require('lib.dirapi').handle(ngx.var.webdav_root)
    }
}

# /api/rm/ — Delete a file or directory (recursive)
# Method: DELETE /api/rm/<path>
location /api/rm/ {
    content_by_lua_block {
        if ngx.req.get_method() ~= "DELETE" then
            ngx.status = 405
            ngx.header["Allow"] = "DELETE"
            ngx.header["Content-Type"] = "application/json; charset=utf-8"
            ngx.print('{"error":"method_not_allowed","message":"use DELETE"}')
            ngx.exit(405)
        end
        require('lib.fileapi').handle_rm(ngx.var.webdav_root)
    }
}

# /api/move — Move or rename a file/directory
# Method: POST /api/move
# Body:   {"from": "/src/path", "to": "/dst/path"}
location = /api/move {
    content_by_lua_block {
        if ngx.req.get_method() ~= "POST" then
            ngx.status = 405
            ngx.header["Allow"] = "POST"
            ngx.header["Content-Type"] = "application/json; charset=utf-8"
            ngx.print('{"error":"method_not_allowed","message":"use POST"}')
            ngx.exit(405)
        end
        require('lib.fileapi').handle_move(ngx.var.webdav_root)
    }
}

# /api/mkdir/ — Create a directory (mkdir -p semantics)
