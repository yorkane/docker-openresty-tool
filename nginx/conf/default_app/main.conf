# /api/upload/ — Upload a file (raw body, creates parent dirs automatically)
# Method: POST /api/upload/<path>
location /api/upload/ {
    client_max_body_size 0;   # no upload size cap at this location (inherits if 0 doesn't work)
    content_by_lua_block {
        if ngx.req.get_method() ~= "POST" then
            ngx.status = 405
            ngx.header["Allow"] = "POST"
            ngx.header["Content-Type"] = "application/json; charset=utf-8"
            ngx.print('{"error":"method_not_allowed","message":"use POST"}')
            ngx.exit(405)
        end
        require('lib.fileapi').handle_upload(ngx.var.webdav_root)
    }
}

