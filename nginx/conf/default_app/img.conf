# ── /img/ Location Template ─────────────────────────────────────────────────
# Dynamic image processing via libvips (lua-vips) with nginx proxy_cache
# URL: /img/<path>?w=400&h=300&fit=cover&fmt=webp&q=80
#
# Cache configuration (via environment variables):
#   - OR_IMG_CACHE_PATH:  cache directory (default /data/cache)
#   - OR_IMG_CACHE_MAX:   max cache size (default 2g)
#   - OR_IMG_CACHE_INACTIVE: inactive time before removal (default 60d)
#   - OR_IMG_CACHE_VALID: cache validity (default 2d)
#
# Architecture:
#   /img/ → proxy_pass → 127.0.0.1:81/img_internal/ → content_by_lua (vips)
#   This allows nginx proxy_cache to cache Lua-generated content.
#
# Generated from: nginx/conf/tpl.img.conf -> nginx/conf/default_app/img.conf
# ─────────────────────────────────────────────────────────────────────────────

# External location: handles caching via proxy_pass to internal server
location /img/ {
    gzip off;

    # ── Nginx proxy_cache configuration ─────────────────────────────────────
    proxy_cache img_cache;
    proxy_cache_key "$scheme$request_method$host$uri$is_args$args";
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;
    proxy_cache_background_update on;
    proxy_cache_revalidate on;
    proxy_cache_lock on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # Cache validity (from environment variable OR_IMG_CACHE_VALID)
    proxy_cache_valid 200 2d;
    proxy_cache_valid 404 1m;

    # Add cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # Proxy to internal server for actual image processing
    # Use rewrite to preserve URL encoding (important for paths with spaces/special chars)
    # $request_uri contains the original URI with encoding, e.g. /img/foo%20bar.jpg?w=100
    rewrite ^(.*)$ /img_internal$1 break;
    proxy_pass http://127.0.0.1:81;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
