# ── Port 82: Public access (no authentication) ─────────────────────────────
# Default port 82, external port 5082
# Allows direct access without auth - suitable for public exposure
server {
    server_name 127.0.0.1;
    listen 82;

    set $webdav_root "/webdav";
    set $checkPropfind "";

    # Skip basic_auth for this server
    rewrite_by_lua_block {
        -- ZIP transparent WebDAV interception (same as main server)
        local zipfs = require('lib.zipfs')
        local uri = ngx.var.uri
        if uri:sub(1, 10) == "/imgproxy/" then
            -- Let the dedicated /imgproxy/ location blocks handle these
        elseif zipfs.is_transparent_enabled() and zipfs.is_zip_request(uri) then
            local zip_end = zipfs.find_zip_boundary(uri)
            local inner = zip_end and uri:sub(zip_end + 1):gsub("^/+", "") or ""
            if inner ~= "" then
                local method = ngx.req.get_method()
                if method == "PROPFIND" then
                    local depth = ngx.req.get_headers()["Depth"] or "1"
                    local xml = zipfs.webdav_propfind(ngx.var.webdav_root, uri, depth)
                    if xml then
                        ngx.status = 207
                        ngx.header["Content-Type"] = "application/xml; charset=utf-8"
                        ngx.header["DAV"] = "1, 2"
                        ngx.print(xml)
                        return ngx.exit(207)
                    end
                elseif method == "GET" or method == "HEAD" then
                    if zipfs.handle_transparent(ngx.var.webdav_root) then
                        return ngx.exit(ngx.OK)
                    end
                end
            end
        end
    }

    dav_ext_lock zone=webdav;
    dav_methods PUT MKCOL;
    dav_ext_methods OPTIONS LOCK UNLOCK;

    autoindex on;
    autoindex_exact_size on;
    autoindex_localtime on;
    fancyindex on;
    fancyindex_exact_size off;
    fancyindex_localtime on;

    root $webdav_root;

    error_page 599 = @propfind_handler;
    error_page 598 = @delete_handler;
    error_page 597 = @copy_move_handler;
    error_page 596 = @propfind_withdepth_handler;

    open_file_cache off;

    if ($request_method != OPTIONS) {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Accept-Charset,X-Accept,origin,accept,if-match,destination,overwrite' always;
        add_header 'Access-Control-Expose-Headers' 'ETag' always;
        add_header 'Access-Control-Max-Age' 1728000 always;
    }

    if ($request_method = OPTIONS) {
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK';
        add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,X-Accept-Charset,X-Accept,origin,accept,if-match,destination,overwrite';
        add_header 'Access-Control-Expose-Headers' 'ETag';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Allow' 'OPTIONS, GET, HEAD, POST, PUT, MKCOL, MOVE, COPY, DELETE, PROPFIND, PROPPATCH, LOCK, UNLOCK';
        add_header 'DAV' '1, 2';
        return 200;
    }

    if ($request_method = PROPFIND) {
        set $checkPropfind "propfind";
    }
    if ($http_depth = 0) {
        set $checkPropfind "${checkPropfind}+withDepth";
    }
    if ($http_depth = 1) {
        set $checkPropfind "${checkPropfind}+withDepth";
    }
    if ($checkPropfind = "propfind") {
        return 599;
    }
    if ($checkPropfind = "propfind+withDepth") {
        return 596;
    }
    if ($request_method = PROPPATCH) {
        add_header 'Content-Type' 'text/xml';
        return 207 '<?xml version="1.0"?><a:multistatus xmlns:a="DAV:"><a:response><a:propstat><a:status>HTTP/1.1 200 OK</a:status></a:propstat></a:response></a:multistatus>';
    }
    if ($request_method = MKCOL) {
        rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
    }
    if ($request_method = DELETE) {
        return 598;
    }
    if ($request_method = COPY) {
        return 597;
    }
    if ($request_method = MOVE) {
        return 597;
    }

    location @propfind_handler {
        internal;
        open_file_cache off;
        if (!-e $webdav_root/$uri) {
            return 404;
        }
        root $webdav_root;
        dav_ext_methods PROPFIND;
    }

    location @propfind_withdepth_handler {
        internal;
        open_file_cache off;
        if (!-e $webdav_root/$uri) {
            return 404;
        }
        root $webdav_root;
        dav_ext_methods PROPFIND;
    }

    location @delete_handler {
        internal;
        open_file_cache off;
        if ($destination ~ ^https?://(?<captured_path>.*)$) {
            set $new_path $captured_path;
            more_set_input_headers "Destination: http://$new_path";
        }
        if (-d $webdav_root/$uri) {
            more_set_input_headers "Destination: http://$new_path/";
            rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
        end
        root $webdav_root;
        dav_methods DELETE;
    }

    location @copy_move_handler {
        internal;
        open_file_cache off;
        if ($destination ~ ^https?://(?<captured_path>.*)$) {
            set $new_path $captured_path;
            more_set_input_headers "Destination: http://$new_path";
        end
        if (-d $webdav_root/$uri) {
            more_set_input_headers "Destination: http://$new_path/";
            rewrite ^(?<captured_path>.*[^/])$ $captured_path/ break;
        end
        root $webdav_root;
        dav_methods COPY MOVE;
    }

    # Include extra locations (img, zip, api endpoints)
    include default_app/img.conf;

    location /zip/ {
        content_by_lua_block {
            require('lib.zipfs').handle(ngx.var.webdav_root)
        }
    }

    location /api/ls/ {
        content_by_lua_block {
            local method = ngx.req.get_method()
            if method == "OPTIONS" then
                ngx.header['Access-Control-Allow-Origin'] = '*'
                ngx.header['Access-Control-Allow-Methods'] = 'GET, OPTIONS'
                ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
                ngx.header['Access-Control-Max-Age'] = '1728000'
                ngx.status = 200
                ngx.exit(200)
            end
            ngx.header['Access-Control-Allow-Origin'] = '*'
            ngx.header['Access-Control-Allow-Methods'] = 'GET, OPTIONS'
            ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
            require('lib.dirapi').handle(ngx.var.webdav_root)
        }
    }

    location /api/rm/ {
        content_by_lua_block {
            local method = ngx.req.get_method()
            if method == "OPTIONS" then
                ngx.header['Access-Control-Allow-Origin'] = '*'
                ngx.header['Access-Control-Allow-Methods'] = 'DELETE, OPTIONS'
                ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
                ngx.header['Access-Control-Max-Age'] = '1728000'
                ngx.status = 200
                ngx.exit(200)
            end
            ngx.header['Access-Control-Allow-Origin'] = '*'
            ngx.header['Access-Control-Allow-Methods'] = 'DELETE, OPTIONS'
            ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
            if method ~= "DELETE" then
                ngx.status = 405
                ngx.header["Content-Type"] = "application/json; charset=utf-8"
                ngx.header["Allow"] = "DELETE"
                ngx.print('{"error":"method_not_allowed","message":"use DELETE"}')
                ngx.exit(405)
            end
            require('lib.fileapi').handle_rm(ngx.var.webdav_root)
        }
    }

    location /api/upload/ {
        client_max_body_size 0;
        content_by_lua_block {
            local method = ngx.req.get_method()
            if method == "OPTIONS" then
                ngx.header['Access-Control-Allow-Origin'] = '*'
                ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
                ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
                ngx.header['Access-Control-Max-Age'] = '1728000'
                ngx.status = 200
                ngx.exit(200)
            end
            ngx.header['Access-Control-Allow-Origin'] = '*'
            ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
            ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
            if method ~= "POST" then
                ngx.status = 405
                ngx.header["Allow"] = "POST"
                ngx.header["Content-Type"] = "application/json; charset=utf-8"
                ngx.print('{"error":"method_not_allowed","message":"use POST"}')
                ngx.exit(405)
            end
            require('lib.fileapi').handle_upload(ngx.var.webdav_root)
        }
    }

    location = /api/batch-img {
        client_max_body_size 1m;
        client_body_buffer_size 256k;
        client_body_timeout 30s;
        send_timeout 600s;
        gzip off;
        content_by_lua_block {
            local method = ngx.req.get_method()
            if method == "OPTIONS" then
                ngx.header['Access-Control-Allow-Origin'] = '*'
                ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
                ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
                ngx.header['Access-Control-Max-Age'] = '1728000'
                ngx.status = 200
                ngx.exit(200)
            end
            ngx.header['Access-Control-Allow-Origin'] = '*'
            ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
            ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
            require('lib.batchapi').handle(ngx.var.webdav_root)
        }
    }

    location = /api/img {
        client_max_body_size 0;
        client_body_buffer_size 32m;
        client_body_timeout 60s;
        send_timeout 120s;
        gzip off;
        content_by_lua_block {
            local method = ngx.req.get_method()
            if method == "OPTIONS" then
                ngx.header['Access-Control-Allow-Origin'] = '*'
                ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
                ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
                ngx.header['Access-Control-Max-Age'] = '1728000'
                ngx.status = 200
                ngx.exit(200)
            end
            ngx.header['Access-Control-Allow-Origin'] = '*'
            ngx.header['Access-Control-Allow-Methods'] = 'POST, OPTIONS'
            ngx.header['Access-Control-Allow-Headers'] = 'Authorization,Content-Type,DNT,User-Agent,X-Requested-With'
            require('lib.imgapi').handle()
        }
    }

    location ~* ^/api/?$ {
        default_type application/json;
        return 404 '{"error":"not_found","message":"no such API endpoint"}';
    }
}

# insert your own http server here


	server {
        listen 443 ssl;
        server_name _;
        # fallback certs, make sure to create them before hand
        ssl_certificate cert/default.pem;
        ssl_certificate_key cert/default.key;

        ssl_certificate_by_lua_block {
            require("resty.acme.autossl").ssl_certificate()
        }
        include default_app/main.conf;

        location /.well-known {
            content_by_lua_block {
                require("resty.acme.autossl").serve_http_challenge()
            }
        }
    }