services:
  yot:
    image: ghcr.io/yorkane/docker-openresty-tool:latest
    container_name: ${YOT_CONTAINER_NAME:-yot}
    platform: linux/amd64
    environment:
      - NGX_OVERWRITE_CONFIG=true
      - NGX_PORT=${NGX_PORT:-80}
      - NGX_WORKER=${NGX_WORKER:-auto}
      - NGX_HOST=${NGX_HOST:-_}
      - NGX_LOG_FILE=${NGX_LOG_FILE:-false}
      - NGX_LOG_LEVEL=${NGX_LOG_LEVEL:-warn}
      - GID=${GID:-1000}
      - UID=${UID:-1000}
      # /img/ cache configuration (nginx proxy_cache)
      - OR_IMG_CACHE_VALID=${OR_IMG_CACHE_VALID:-2d}
      - OR_IMG_CACHE_MAX=${OR_IMG_CACHE_MAX:-2g}
      - OR_IMG_CACHE_INACTIVE=${OR_IMG_CACHE_INACTIVE:-60d}
      - OR_IMG_CACHE_PATH=${OR_IMG_CACHE_PATH:-/data/cache}
      - OR_IMG_CACHE_BACKGROUND_UPDATE=${OR_IMG_CACHE_BACKGROUND_UPDATE:-on}
      - OR_IMG_CACHE_USE_STALE=${OR_IMG_CACHE_USE_STALE:-error timeout updating http_500 http_502 http_503 http_504}
      # imgproxy upstream (yot handles all caching, imgproxy has cache disabled)
      # Supports multiple upstream servers via OR_IMGPROXY_UPSTREAM env var:
      #   OR_IMGPROXY_UPSTREAM=imgproxy1:8080,imgproxy2:8080,imgproxy3:8080
      # Uses round-robin load balancing across servers.
      - OR_IMGPROXY_UPSTREAM=${OR_IMGPROXY_UPSTREAM:-}
      # Internal address imgproxy uses to fetch images from yot (default: http://yot:80)
      - OR_IMGPROXY_WEBDAV_ENDPOINT=${OR_IMGPROXY_WEBDAV_ENDPOINT:-http://yot:80}
      # IP whitelist for免认证访问 (逗号分隔，支持IP段如 192.168.1.0/24)
      # OR_IMGPROXY_UPSTREAM 中的IP会自动加入白名单
      - OR_AUTH_IP_WHITELIST=${OR_AUTH_IP_WHITELIST:-}
      # Internal auth header for trusted services (imgproxy) to bypass IP whitelist
      # Supports: OR_AUTH_BEARER (Bearer token / User-Agent), OR_INTERNAL_AUTH_HEADER (X-Internal-Auth, legacy)
      - OR_AUTH_BEARER=${OR_AUTH_BEARER:-}
      - OR_INTERNAL_AUTH_HEADER=${OR_INTERNAL_AUTH_HEADER:-}
      # Basic auth (optional): format "username:password"
      - OR_AUTH_USER=${OR_AUTH_USER:-gallery:test@123}
    entrypoint: ["sh", "/usr/local/openresty/nginx/conf/entrypoint.sh"]
    volumes:
      - ./data:/webdav
      - ./data:/data
      # ⚠️  Do NOT mount ./nginx:/usr/local/openresty/nginx — it shadows sbin/ and
      #     makes nginx unreachable. Mount only the sub-directories you need:
      - ./nginx/conf:/usr/local/openresty/nginx/conf
      - ./nginx/html:/usr/local/openresty/nginx/html
      - ./nginx/lua:/usr/local/openresty/nginx/lua
      # RAM disk for imgproxy temp files (zero disk I/O)
      - ramdisk:/mnt/ramdisk
    restart: unless-stopped
    ports:
      - "${YOT_HTTP_PORT:-5080}:80"
      - "${OR_NO_AUTH_PORT:-5082}:82"
    depends_on:
      - imgproxy

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: ${IMGPROXY_CONTAINER_NAME:-imgproxy}
    platform: linux/amd64
    environment:
      # External port (used for healthcheck and reference)
      - IMGPROXY_PORT=${IMGPROXY_EXTERNAL_PORT:-5081}
      # Filesystem access (ROOT=/ allows imgproxy to access any absolute path)
      #   local:///data/images/photo.jpg → /data/images/photo.jpg (webdav files)
      #   local:///mnt/ramdisk/.imgapi-tmp/x.jpg → /mnt/ramdisk/.imgapi-tmp/x.jpg (POST uploads)
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=${IMGPROXY_LOCAL_FILESYSTEM_ROOT:-/}
      # Cache settings (yot handles all caching, imgproxy can use minimal cache)
      - IMGPROXY_DISABLE_CACHE=${IMGPROXY_DISABLE_CACHE:-true}
      - IMGPROXY_CACHE_SIZE=${IMGPROXY_CACHE_SIZE:-}
      # Performance settings
      - IMGPROXY_WORKERS=${IMGPROXY_WORKERS:-1}
      - IMGPROXY_MAX_SRC_FILESIZE=${IMGPROXY_MAX_SRC_FILESIZE:-104857600}
      - IMGPROXY_MAX_RESOLUTION=${IMGPROXY_MAX_RESOLUTION:-66741696}
      - IMGPROXY_STRIP_COLOR_PROFILE=${IMGPROXY_STRIP_COLOR_PROFILE:-Never}
      - IMGPROXY_ENFORCE_TRANSPARENCY=${IMGPROXY_ENFORCE_TRANSPARENCY:-false}
      - IMGPROXY_GZIP_MIME_TYPES=${IMGPROXY_GZIP_MIME_TYPES:-}
      - IMGPROXY_LOG_LEVEL=${IMGPROXY_LOG_LEVEL:-warn}
      - IMGPROXY_USER_AGENT=${IMGPROXY_USER_AGENT:-}
      - IMGPROXY_DEV_MODE_STRICT=${IMGPROXY_DEV_MODE_STRICT:-false}
      - IMGPROXY_FAMILY=${IMGPROXY_FAMILY:-0}
      # WebDAV access to yot for ZIP/CBZ transparent processing
      - IMGPROXY_WEBDAV_ROOT=${IMGPROXY_WEBDAV_ROOT:-/webdav}
      - IMGPROXY_WEBDAV_ENDPOINT=${IMGPROXY_WEBDAV_ENDPOINT:-http://yot:80}
      - IMGPROXY_WEBDAV_USER=${IMGPROXY_WEBDAV_USER:-}
      - IMGPROXY_WEBDAV_PASSWORD=${IMGPROXY_WEBDAV_PASSWORD:-}
    volumes:
      - ./data:/data:ro
      # RAM disk for imgproxy temp files
      - ramdisk:/mnt/ramdisk
    restart: unless-stopped
    ports:
      - "${IMGPROXY_EXTERNAL_PORT:-5081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ramdisk:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=${RAMDISK_SIZE:-512m},uid=${UID:-1000},gid=${GID:-1000}"
