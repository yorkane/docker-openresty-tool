version: "3"
services:
  yot:
    image: yorkane/docker-openresty-tool:latest
    container_name: yot
    environment:
      - NGX_OVERWRITE_CONFIG=true
      - NGX_PORT=80
      - NGX_WORKER=auto
      - NGX_HOST=${NGX_HOST:-_}
      - NGX_LOG_FILE=false
      - NGX_LOG_LEVEL=warn
      - GID=1000
      - UID=1000
      # - OR_AUTH_USER=admin:admin
    entrypoint: ["sh", "/usr/local/openresty/nginx/conf/entrypoint.sh"]
    volumes:
      - ./data:/webdav
      - ./data:/data
      - ./nginx:/usr/local/openresty/nginx
    restart: unless-stopped
    ports:
      - "5080:80"