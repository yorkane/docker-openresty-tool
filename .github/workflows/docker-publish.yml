name: Build & Push Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  IMAGE_NAME: yorkane/docker-openresty-tool
  GHCR_IMAGE: ghcr.io/yorkane/docker-openresty-tool

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Now uses pre-built openresty-base, only installs Lua libs (~5-10 min)
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write   # required for pushing to ghcr.io

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (for multi-platform builds) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Log in to GitHub Container Registry (ghcr.io) ──────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract metadata (tags & labels) ───────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Push to both Docker Hub and GHCR simultaneously
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 7. Build and push ─────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up layer reuse
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Print pushed image digest ──────────────────────────────────────
      - name: Image digest
        run: |
          echo "Pushed ${{ env.IMAGE_NAME }} → ${{ steps.build.outputs.digest }}"
          echo "Pushed ${{ env.GHCR_IMAGE }} → ${{ steps.build.outputs.digest }}"
