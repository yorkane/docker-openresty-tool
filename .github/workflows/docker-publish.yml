name: Build & Push Tool Image

# Trigger on every push to main (and any branch push for PR previews).
# The base image (yorkane/openresty-base) is referenced from Docker Hub,
# so this workflow only needs to build the top-level Dockerfile.
on:
  push:
    branches:
      - main
    # Optionally ignore-only docs so pure README edits don't trigger a build:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'api.md'

  # Triggered automatically when the base image is rebuilt
  repository_dispatch:
    types: [base-image-updated]

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  IMAGE_NAME: yorkane/docker-openresty-tool

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (for multi-platform builds) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Extract metadata (tags & labels) ───────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Always tag :latest on main
            type=raw,value=latest,enable={{is_default_branch}}
            # Short commit SHA tag, e.g. sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # Semver tags when a vX.Y.Z Git tag is pushed
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 6. Build and push ─────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Build for amd64; arm64 cross-compilation is too slow with QEMU
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Point to the published base image instead of the local orabase:1
          build-args: |
            BASE_IMAGE=yorkane/openresty-base:latest
          # Use GitHub Actions cache to speed up layer reuse
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print pushed image digest ──────────────────────────────────────
      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }} → ${{ steps.build.outputs.digest }}"
