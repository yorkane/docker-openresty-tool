name: Build & Push Base Image

# Only rebuild the base image when base.Dockerfile itself changes.
# The base image is published as yorkane/openresty-base on Docker Hub.
# After it is pushed, the tool image workflow should be re-triggered manually
# (or you can add a repository_dispatch / workflow_call here).
on:
  push:
    branches:
      - main
    paths:
      - 'base.Dockerfile'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  BASE_IMAGE: yorkane/openresty-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU (arm64 support) ────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Buildx ─────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Docker Hub login ────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Metadata ────────────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      # ── 6. Build and push base image ───────────────────────────────────────
      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Trigger tool image rebuild ──────────────────────────────────────
      # After the base is updated, automatically kick off the tool image build.
      - name: Trigger tool image workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: base-image-updated
